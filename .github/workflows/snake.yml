name: Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: sudharshan970
          outputs: |
            dist/github-contribution-grid-snake.svg

      - name: Push snake animation
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist
